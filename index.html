<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fatima Dembele</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>

  <!-- ══════════════
       INTRO
  ══════════════ -->
  <div id="intro" role="dialog" aria-modal="true" aria-labelledby="barista-msg">
    <div class="intro-counter" aria-hidden="true"></div>
    <div class="barista-area">
      <div class="barista-icon" aria-hidden="true">☕</div>
      <div class="intro-heading">Before you dive in…</div>
      <div class="speech-bubble">
        <p id="barista-msg">
          Have some <strong>Ataya</strong><br/>
          <em style="font-style:italic; color: var(--caramel2); font-size:0.9em;">West African Tea</em>
        </p>
      </div>
    </div>
    <button class="cta-btn" id="yes-btn" aria-label="Yes please, pour me some Ataya">
      <span>Yes please! 🍵</span>
    </button>
  </div>

  <!-- ══════════════
       POUR SCENE
  ══════════════ -->
  <div id="pour-scene" role="region" aria-label="Ataya being poured">
    <p class="pour-label">Your Ataya is being poured…</p>

    <!-- Tea stream falling from top of screen -->
    <div class="tea-drop" aria-hidden="true"></div>

    <div class="glass-scene">
      <!-- Steam -->
      <div class="steam" aria-hidden="true"><span></span><span></span><span></span></div>
      <!-- Foam layer -->
      <div class="foam" aria-hidden="true"></div>
      <!-- Tea fill (rises from bottom) -->
      <div class="tea-fill" aria-hidden="true"></div>

      <!-- Glass SVG — matches the real Ataya glass photo:
           wider at top, slight taper, flat vertical panel ridges, thick base -->
      <svg class="cup-svg" viewBox="0 0 130 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glass of Ataya tea">
        <defs>
          <!-- Left-edge glass shine -->
          <linearGradient id="gshine2" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%"   stop-color="white" stop-opacity="0.30"/>
            <stop offset="18%"  stop-color="white" stop-opacity="0.08"/>
            <stop offset="70%"  stop-color="white" stop-opacity="0.02"/>
            <stop offset="100%" stop-color="white" stop-opacity="0.18"/>
          </linearGradient>
          <!-- Clip to glass interior -->
          <clipPath id="glass-clip">
            <!-- Glass shape: wider at top, slight taper to flat bottom -->
            <path d="M18 18 C18 18 12 160 12 162 Q12 172 30 172 L100 172 Q118 172 118 162 C118 162 112 18 112 18 Z"/>
          </clipPath>
        </defs>

        <!-- Glass body background (very subtle tint) -->
        <path d="M18 18 C18 18 12 160 12 162 Q12 172 30 172 L100 172 Q118 172 118 162 C118 162 112 18 112 18 Z"
              fill="hsl(200 15% 88% / 0.12)"/>

        <!-- Vertical panel ridges (like the real glass — flat facets) -->
        <g clip-path="url(#glass-clip)">
          <!-- Panel divider lines — slightly tapered -->
          <g stroke="hsl(210 15% 70%)" stroke-width="1.8" opacity="0.22" stroke-linecap="butt">
            <line x1="30"  y1="18" x2="23"  y2="172"/>
            <line x1="44"  y1="18" x2="39"  y2="172"/>
            <line x1="58"  y1="18" x2="55"  y2="172"/>
            <line x1="72"  y1="18" x2="75"  y2="172"/>
            <line x1="86"  y1="18" x2="91"  y2="172"/>
            <line x1="100" y1="18" x2="107" y2="172"/>
          </g>
          <!-- Panel highlight strips (right edge of each facet catches light) -->
          <g stroke="white" stroke-width="1" opacity="0.12" stroke-linecap="butt">
            <line x1="28"  y1="18" x2="21"  y2="172"/>
            <line x1="42"  y1="18" x2="37"  y2="172"/>
            <line x1="56"  y1="18" x2="53"  y2="172"/>
            <line x1="70"  y1="18" x2="73"  y2="172"/>
            <line x1="84"  y1="18" x2="89"  y2="172"/>
            <line x1="98"  y1="18" x2="105" y2="172"/>
          </g>
        </g>

        <!-- Outer glass outline -->
        <path d="M18 18 C18 18 12 160 12 162 Q12 172 30 172 L100 172 Q118 172 118 162 C118 162 112 18 112 18 Z"
              fill="none"
              stroke="hsl(210 15% 78%)"
              stroke-width="2.5"
              stroke-linejoin="round"
              opacity="0.7"/>

        <!-- Top rim — wide ellipse -->
        <ellipse cx="65" cy="18" rx="47" ry="9"
                 fill="none"
                 stroke="hsl(210 15% 80%)"
                 stroke-width="2.2"
                 opacity="0.85"/>

        <!-- Thick base -->
        <path d="M12 162 Q12 172 30 172 L100 172 Q118 172 118 162 L115 158 Q115 166 100 166 L30 166 Q15 166 15 158 Z"
              fill="hsl(210 10% 82% / 0.35)"/>
        <ellipse cx="65" cy="168" rx="36" ry="5"
                 fill="hsl(210 10% 70% / 0.4)"/>

        <!-- Glass shine overlay -->
        <path d="M18 18 C18 18 12 160 12 162 Q12 172 30 172 L100 172 Q118 172 118 162 C118 162 112 18 112 18 Z"
              fill="url(#gshine2)"/>

        <!-- Left highlight edge streak -->
        <path d="M20 24 L14 158" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.20"/>
        <!-- Secondary right edge -->
        <path d="M110 24 L116 155" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.08"/>
      </svg>
    </div>

    <button class="enter-btn" id="enter-btn" aria-label="Enter portfolio" style="display:none"></button>
  </div>

    </div>

    <!-- Shards container — JS populates these -->
    <div class="shards" id="shards"></div>
  </div>
  <!-- ══════════════════════════════════════
       ORIGINAL SITE (structure unchanged)
  ══════════════════════════════════════ -->
  <div id="site" style="opacity:0; transition: opacity 0.8s;">

    <svg class="scroll-icon" viewBox="0 0 24 24">
      <path fill="currentColor" d="M20 6H23L19 2L15 6H18V18H15L19 22L23 18H20V6M9 3.09C11.83 3.57 14 6.04 14 9H9V3.09M14 11V15C14 18.3 11.3 21 8 21S2 18.3 2 15V11H14M7 9H2C2 6.04 4.17 3.57 7 3.09V9Z"/>
    </svg>

    <header>
      <h1><span>the works of</span><br />Fatima Dembele.</h1>
    </header>

    <main>
      <div class="scroll-section laptop">
        <section>
          <div class="scene__zoom">
            <div class="scene">
              <div class="scene__rock">
                <div class="scene__spin">
                  <div class="scene__shadow">
                    <div class="scene__jump">
                      <div class="scene__flip">
                        <div class="jbook">

                          <div class="jbook__shell shell shell--top">
                            <!-- espresso cup on laptop screen — fade transition -->
                            <svg id="screen-mug" class="screen-espresso" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                              <ellipse cx="40" cy="74" rx="20" ry="4" fill="hsl(20 40% 8%)" opacity="0.45"/>
                              <rect x="17" y="29" width="42" height="40" rx="4" fill="hsl(20 58% 9%)"/>
                              <rect x="19" y="31" width="38" height="36" rx="3" fill="hsl(22 52% 16%)"/>
                              <ellipse cx="38" cy="31" rx="19" ry="5" fill="hsl(36 38% 86%)"/>
                              <ellipse cx="38" cy="31" rx="14" ry="3.4" fill="hsl(35 32% 90%)" class="foam-top"/>
                              <ellipse cx="33" cy="30" rx="6" ry="2.2" fill="white" opacity="0.4"/>
                              <path d="M59 40 Q71 40 70 52 Q69 62 59 60" fill="none" stroke="hsl(22 38% 20%)" stroke-width="4" stroke-linecap="round"/>
                              <rect x="21" y="63" width="34" height="4" rx="2" fill="hsl(20 48% 12%)"/>
                              <ellipse cx="38" cy="65" rx="20" ry="3" fill="hsl(20 40% 14%)" opacity="0.65"/>
                            </svg>
                            <div class="cuboid">
                              <div class="cuboid__side"></div>
                              <div class="cuboid__side"></div>
                              <div class="cuboid__side"></div>
                              <div class="cuboid__side"></div>
                              <div class="cuboid__side">
                                <!-- shell-espresso replaces shell-bear -->
                                <svg class="shell-espresso" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                  <rect x="17" y="29" width="42" height="40" rx="4" fill="hsl(20 55% 11%)"/>
                                  <rect x="19" y="31" width="38" height="36" rx="3" fill="hsl(22 48% 19%)"/>
                                  <ellipse cx="38" cy="31" rx="19" ry="5" fill="hsl(36 35% 84%)"/>
                                  <ellipse cx="38" cy="31" rx="14" ry="3.4" fill="hsl(35 30% 88%)"/>
                                  <path d="M59 40 Q71 40 70 52 Q69 62 59 60" fill="none" stroke="hsl(22 35% 22%)" stroke-width="4" stroke-linecap="round"/>
                                  <rect x="21" y="63" width="34" height="4" rx="2" fill="hsl(20 44% 14%)"/>
                                </svg>
                              </div>
                              <div class="cuboid__side"></div>
                            </div>
                          </div>

                          <div class="jbook__shell shell shell--bottom">
                            <svg class="laptop-keyboard" xmlns="http://www.w3.org/2000/svg" version="1.0" viewBox="0 0 1280 411" aria-hidden="true">

                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

      </div>

    </main>

  </div><!-- #site -->

</body>
</html>
